<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار ترشيد الطاقة</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f8f4;
    animation: pageFade 1.5s ease forwards; 
}
header{
    background:#e8f5e9;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    animation: slideDown 1.2s ease forwards; 
}
header img{
    height:50px;
    margin-right:20px;
    animation: bounceLogo 3s infinite; 
}
header h1{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    color:#2e7d32;
    animation: fadeIn 2s ease forwards;
}
nav{
    position:absolute;
    left:40px;
}
nav a{
    text-decoration:none;
    color:#2e7d32;
    margin:0 12px;
    font-weight:bold;
    transition: color 0.3s ease;
}
nav a:hover{ color:#1b5e20; }
nav a.active{ color:#1b5e20; border-bottom:2px solid #1b5e20; }
.container{
    max-width:800px;
    margin:50px auto;
    background:rgba(165,214,167,0.9);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    animation: fadeUp 2s ease forwards; 
}
.title-box{
    background:#ffeb3b;
    padding:15px;
    border-radius:12px;
    text-align:center;
    margin-bottom:30px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    animation: titleGlow 3s ease-in-out infinite;
}
.title-box h1{
    font-size:28px;
    margin:0;
    color:#2e7d32;
    text-shadow:2px 2px 6px rgba(0,0,0,0.2);
}
@keyframes titleGlow {
    0%   {box-shadow:0 0 10px rgba(251,192,45,0.5);}
    50%  {box-shadow:0 0 25px rgba(251,192,45,0.9);}
    100% {box-shadow:0 0 10px rgba(251,192,45,0.5);}
}
.question{
    margin-bottom:25px;
    animation: fadeUp 2s ease forwards;
}
.question h3{
    margin-bottom:10px;
    color:#1b5e20;
}
label{
    display:block;
    margin:8px 0;
    cursor:pointer;
}
.correct{ color:green; font-weight:bold; }
.wrong{ color:red; font-weight:bold; }
#result{
    text-align:center;
    font-size:20px;
    margin-top:25px;
    color:#2e7d32;
}
.submit-btn{
    display:block;
    margin:30px auto 0;
    font-size:18px;
    padding:12px 28px;
    background:#ffeb3b;
    color:#2e7d32;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,235,59,0.7);
    animation: glowBtn 2s ease-in-out infinite;
    transition:0.4s;
}
.submit-btn:hover{
    background:#fdd835;
    transform:scale(1.1);
}
@keyframes glowBtn {
    0% {box-shadow:0 0 10px rgba(255,235,59,0.5);}
    50% {box-shadow:0 0 25px rgba(255,235,59,1);}
    100% {box-shadow:0 0 10px rgba(255,235,59,0.5);}
}
@keyframes bounceLogo {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
}
@keyframes fadeIn {from {opacity:0;} to {opacity:1;}}
@keyframes fadeUp {from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);}}
@keyframes slideDown {from {transform:translateY(-50px); opacity:0;} to {transform:translateY(0); opacity:1;}}
@keyframes pageFade {from {opacity:0;} to {opacity:1;}}
</style>
</head>
<body>
<header>
    <img src="./image/logo.png" alt="شعار الموقع">
    <h1>موقع ترشيد الطاقة</h1>
    <nav>
        <a href="index2.html">الرئيسية</a>
        <a href="about2.html">فيديو</a>
        <a href="tips2.html">نصائح</a>
        <a href="poster2.html">بوستر</a>
        <a href="quiz2.html" class="active">تفاعل</a>
        <a href="contact2.html">تواصل</a>
    </nav>
</header>
<div class="container">
<div class="title-box">
    <h1>هيا نختبر معلوماتك</h1>
</div>
<div class="question">
<h3>ما أفضل طريقة لتوفير الكهرباء؟</h3>
<label><input type="radio" name="q1" value="1"> إطفاء الأجهزة عند عدم استخدامها</label>
<label><input type="radio" name="q1" value="2"> ترك الأجهزة تعمل دائمًا</label>
<label><input type="radio" name="q1" value="3"> فتح كل الأضواء</label>
</div>
<div class="question">
<h3>أي نوع مصابيح أفضل لتوفير الطاقة؟</h3>
<label><input type="radio" name="q2" value="1"> مصابيح LED</label>
<label><input type="radio" name="q2" value="2"> المصابيح القديمة</label>
<label><input type="radio" name="q2" value="3"> المصابيح المتكسرة</label>
</div>
<div class="question">
<h3>لماذا نستخدم الطاقة الشمسية؟</h3>
<label><input type="radio" name="q3" value="1"> لتقليل التلوث والفواتير</label>
<label><input type="radio" name="q3" value="2"> لزيادة التلوث</label>
<label><input type="radio" name="q3" value="3"> لإهدار المال</label>
</div>
<div class="question">
<h3>ماذا تفعل عند مغادرة الغرفة؟</h3>
<label><input type="radio" name="q4" value="1"> إطفاء الضوء والمكيف</label>
<label><input type="radio" name="q4" value="2"> تركهم يعملون</label>
<label><input type="radio" name="q4" value="3"> رفع الصوت فقط</label>
</div>
<button class="submit-btn" onclick="checkAnswers()">أرسل إجاباتي ✅</button>
<div id="result"></div>
</div>
<script>
function checkAnswers(){
    let answers = {q1:"1", q2:"1", q3:"1", q4:"1"};
    let score = 0;
    for(let q in answers){
        let radios = document.getElementsByName(q);
        radios.forEach(radio =>{
            let label = radio.parentElement;
            label.classList.remove("correct","wrong");
            if(radio.checked){
                if(radio.value === answers[q]){
                    label.classList.add("correct");
                    score++;
                } else {
                    label.classList.add("wrong");
                }
            }
            if(radio.value === answers[q]){
                label.classList.add("correct");
            }
        });
    }
    let result = document.getElementById("result");
    if(score === 4){
        result.innerHTML = "🏆 ممتاز! كل إجاباتك صحيحة!";
    } else if(score >= 2){
        result.innerHTML = "👍 جيد جدًا! حاول تحسين نتيجتك.";
    } else {
        result.innerHTML = "⚠️ حاول مرة أخرى لتتعلم أكثر.";
    }
}
</script>
</body>
</html>
